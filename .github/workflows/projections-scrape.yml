name: Wednesday Projections Scrape

on:
  schedule:
    # Every Wednesday at 14:00 UTC (10 AM ET) — after Tuesday waiver processing
    - cron: '0 14 * * 3'
  workflow_dispatch:  # Allow manual trigger from GitHub Actions tab

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fantasy-analyzer

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: fantasy-analyzer/requirements.txt

      - name: Install dependencies
        run: pip install -e .

      - name: Scrape projections and refresh rosters
        run: python -m fantasy_analyzer.cli scrape-projections

      - name: Commit updated DB
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/league.db
          git diff --staged --quiet && echo "No changes to commit" || \
            git commit -m "chore: weekly projections scrape $(date -u +'%Y-%m-%d')"

      - name: Push changes
        run: git push
