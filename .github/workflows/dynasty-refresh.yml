name: Dynasty Rankings Refresh

# Manual trigger only — run at these 4 checkpoints each year:
#   1. Post rookie draft      (late May / early June)
#   2. Week 1                 (early September)
#   3. Post trade deadline    (early November)
#   4. Post championship      (mid January)
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fantasy-analyzer

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: fantasy-analyzer/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt -e .

      - name: Refresh current rosters and dynasty values
        run: python -m fantasy_analyzer.cli scrape-dynasty

      - name: Commit updated DB
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/league.db
          git diff --staged --quiet && echo "No changes to commit" || \
            git commit -m "chore: dynasty rankings refresh $(date -u +'%Y-%m-%d')"

      - name: Push changes
        run: git push
